    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header-principal">
        <div class="contenedor-header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px;">
            <a href="index.html">
                <img src="logo.png" alt="Logo Distrisol" style="width: 80px;">
            </a>
            <div class="buscador-contenedor">
    <input type="text" id="busqueda" placeholder="Buscar productos..." onkeyup="filtrarBusqueda()">
    <button type="button"><i class="fas fa-search"></i></button>
</div>
          <div class="menu-hamburguesa" id="btn-menu" onclick="toggleMenu()">☰</div>

<nav id="menu-desplegable" class="oculto">
    <ul>
        <li><a href="quienes.html">Quiénes Somos</a></li>
        <li><a href="servicios.html">Servicios</a></li>
        <li><a href="cobertura.html">Cobertura</a></li>
        <li><a href="servicioalcliente.html">Servicio al cliente</a></li>
        </ul>
</nav>
        </div>
    </header>


    <div class="banner-promos-mini">
        <p>¡MÁS RÁPIDO Y FÁCIL! TOMA TUS PEDIDOS Y COMPRA AL INSTANTE</p>
    </div>

    <!-- Contenido principal que cambia dinámicamente -->
    <main class="contenedor-catalogo-global">
        <div id="seccion-marcas-menu">
            <div class="titulo-seccion-tienda">
                <h2>Por favor, selecciona una marca</h2>
            </div>
            <div class="cuadricula-marcas-grid">
                <div class="tarjeta-marca-item" onclick="seleccionarYFiltrar('Coca-Cola')"><div class="imagen-marca-wrap"><img src="img/cocacola.jpg" alt="Coca-Cola" onerror="this.src='logo.png'"></div></div>
                <div class="tarjeta-marca-item" onclick="seleccionarYFiltrar('postobon')"><div class="imagen-marca-wrap"><img src="img/postobon.jpg" alt="postobon" onerror="this.src='logo.png'"></div></div>
                <div class="tarjeta-marca-item" onclick="seleccionarYFiltrar('bigcola')"><div class="imagen-marca-wrap"><img src="img/bigcola.jpg" alt="bigcola" onerror="this.src='logo.png'"></div></div>
                <div class="tarjeta-marca-item" onclick="seleccionarYFiltrar('beer')"><div class="imagen-marca-wrap"><img src="img/cerveza.jpg" alt="beer" onerror="this.src='logo.png'"></div></div>
                <div class="tarjeta-marca-item" onclick="seleccionarYFiltrar('ponymalta')"><div class="imagen-marca-wrap"><img src="img/pony.jpg" alt="pony" onerror="this.src='logo.png'"></div></div>
                <div class="tarjeta-marca-item" onclick="seleccionarYFiltrar('quala')"><div class="imagen-marca-wrap"><img src="img/quala.jpg" alt="quala" onerror="this.src='logo.png'"></div></div>
                <div class="tarjeta-marca-item" onclick="seleccionarYFiltrar('cigarillos')"><div class="imagen-marca-wrap"><img src="img/cigarrillos.jpg" alt="cigarillos" onerror="this.src='logo.png'"></div></div>
                <div class="tarjeta-marca-item" onclick="seleccionarYFiltrar('licores')"><div class="imagen-marca-wrap"><img src="img/licores.jpg" alt="licores" onerror="this.src='logo.png'"></div></div>
                <div class="tarjeta-marca-item" onclick="seleccionarYFiltrar('superricas')"><div class="imagen-marca-wrap"><img src="img/superricas.jpg" alt="superricas" onerror="this.src='logo.png'"></div></div>
                <div class="tarjeta-marca-item" onclick="seleccionarYFiltrar('dulces')"><div class="imagen-marca-wrap"><img src="img/dulces.jpg" alt="dulces" onerror="this.src='logo.png'"></div></div>
                <div class="tarjeta-marca-item" onclick="seleccionarYFiltrar('promociones')"><div class="imagen-marca-wrap"><img src="img/promociones.jpg" alt="promociones" onerror="this.src='logo.png'"></div></div>
            </div>
        </div>

        <div id="seccion-productos-lista" style="display: none;">
            <div class="encabezado-filtro-activo">
                <button class="btn-regresar-marcas" onclick="mostrarMenuMarcas()">
                    <i class="fas fa-arrow-left"></i> Ver todas las marcas
                </button>
                <h3 id="nombre-marca-titulo">Productos</h3>
            </div>
            <div id="contenedor-productos-dinamicos" class="grid-tarjetas-promocionales"></div>
        </div>
    </main>

    <script>
        let todosLosProductos = [];

        async function cargarProductosBase() {
            try {
                const respuesta = await fetch('productos.json');
                todosLosProductos = await respuesta.json();
                let marcaGuardada = localStorage.getItem('marcaActual');
                if (marcaGuardada) seleccionarYFiltrar(marcaGuardada);
            } catch (error) { console.error("Error:", error); }
        }
        cargarProductosBase();

       function seleccionarYFiltrar(marca) {
    localStorage.setItem('marcaActual', marca);
    
    // 1. Limpiamos el buscador al cambiar de marca
    document.getElementById('busqueda').value = "";
    
    // 2. Ocultamos marcas y mostramos productos
    document.getElementById('seccion-marcas-menu').style.display = 'none';
    document.getElementById('seccion-productos-lista').style.display = 'block';
    
    const filtrados = todosLosProductos.filter(p => p.marca && p.marca.toLowerCase() === marca.toLowerCase());
    document.getElementById('nombre-marca-titulo').innerText = `Mostrando: ${marca.toUpperCase()}`;
    
    const contenedor = document.getElementById('contenedor-productos-dinamicos');
    
    // !!! IMPORTANTE: Limpiar el contenedor antes de dibujar
    contenedor.innerHTML = ''; 
    
    filtrados.forEach(p => {
        const tarjeta = document.createElement('div');
        // Usamos la clase que ya tienes definida en tu CSS
        tarjeta.className = 'bloque-afiche-promo'; 
        tarjeta.setAttribute('data-permite-mitad', p.permitemitad);
        
        tarjeta.innerHTML = `
            <img src="${p.imagen}" alt="${p.nombre}" onerror="this.src='logo.png'">
            <h3>${p.nombre}</h3>
            <p class="precio-unitario">$${Number(p.precio).toLocaleString('es-CO')}</p>
            <div class="control-cantidad">
                <button onclick="cambiarCantidad(this, -1)">-</button>
                <span class="cantidad">0</span>
                <button onclick="cambiarCantidad(this, 1)">+</button>
            </div>
        `;
        contenedor.appendChild(tarjeta);
    });
    
    aplicarCantidadesGuardadas();
}

        function mostrarMenuMarcas() {
            localStorage.removeItem('marcaActual');
            document.getElementById('seccion-marcas-menu').style.display = 'block';
            document.getElementById('seccion-productos-lista').style.display = 'none';
        }

        function aplicarCantidadesGuardadas() {
            let datos = localStorage.getItem('miPedido');
            if (!datos) return;
            
            let pedidoGuardado = JSON.parse(datos);
            let tarjetas = document.querySelectorAll('.bloque-afiche-promo');
            
            tarjetas.forEach(tarjeta => {
                let nombre = tarjeta.querySelector('h3').innerText.trim().toLowerCase();
                let item = pedidoGuardado.find(i => i.nombre.trim().toLowerCase() === nombre);
                if (item) {
                    tarjeta.querySelector('.cantidad').innerText = item.cantidad;
                } else {
                    tarjeta.querySelector('.cantidad').innerText = "0";
                }
            });
            if(typeof actualizarTotalGlobal === 'function') actualizarTotalGlobal();
        }
          
        function toggleMenu() {
            const menu = document.getElementById('menu-desplegable');
            menu.classList.toggle('activo');
        }
        // Al cargar productos.html, verificar si viene una búsqueda en la URL
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const busqueda = params.get('buscar');
    if (busqueda) {
        document.getElementById('busqueda').value = busqueda;
        filtrarBusqueda(); // Dispara la búsqueda automáticamente
    }
};
    </script>
      <!-- Carrito fuera del main para que no se oculte al cambiar de marca -->
