<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos - Distribuidora El Sol</title>
    <link rel="stylesheet" href="style.css"> 

<style>/* Contenedor principal de los productos */
.productos-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); /* Hace filas automáticas */
    gap: 20px;
    padding: 20px;
    justify-items: center;
}

/* La tarjeta que envuelve cada producto */
.producto-card {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 15px;
    width: 200px; /* Tamaño fijo para que todos sean iguales */
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    background-color: white;
}

/* AQUÍ ESTÁ EL TRUCO PARA LAS IMÁGENES */
.producto-card img {
    width: 100%;       /* Se ajusta al ancho de la tarjeta */
    height: 150px;     /* Altura fija para que no se vean unas más largas que otras */
    object-fit: contain; /* Ajusta la imagen sin estirarla ni cortarla */
    margin-bottom: 10px;
}

.producto-card h3 {
    font-size: 16px;
    height: 40px;      /* Espacio fijo para el nombre */
    overflow: hidden;
}

.precio {
    color: #27ae60;
    font-weight: bold;
    font-size: 18px;
}
</style>
</head>
<body>
    
    <header>
    
    <h1>Nuestros Productos</h1>
    
    <div style="text-align: center; margin: 20px 0;">
    <input type="text" id="buscar-producto" 
           onkeyup="filtrarPorNombre()" 
           placeholder="🔎 Buscar producto..." 
           style="width: 80%; padding: 12px; border-radius: 25px; border: 2px solid #0056b3; outline: none;">
</div>
    <nav>
       <a href="index.html" style="text-decoration: none; font-size: 30px;">🏠</a>
    </nav>
</header>
    <div id="subcategorias-menu"></div> 

<div class="productos-container" id="contenedor-productos">
    </div>

    <main>
        <div class="productos-container" id="contenedor-productos">
            <p>Cargando catálogo...</p>
        </div>
        <div id="contenedor-productos"></div>

<button onclick="enviarWhatsApp()">Enviar pedido por WhatsApp</button>
    </main>
<div id="carrito-flotante" style="position: fixed; bottom: 20px; right: 20px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 300px; display: none; z-index: 1000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; border: 1px solid #ddd;">
    <div style="background: #0056b3; color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center;">
        <span>🛒 Tu Pedido</span>
        <button onclick="vaciarCarrito()
        " style="background: none;
         border: none; color: white;
          cursor: pointer; font-size: 12px;
           text-decoration: underline;">Vaciar
           </button>
    </div>
    
    <div id="lista-items-carrito" style="max-height: 250px; overflow-y: auto; padding: 15px; background: #f9f9f9;">
        </div>

    <div style="padding: 15px; background: white; border-top: 1px solid #eee;">
        <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; margin-bottom: 10px;">
            <span>Total:</span>
            <span id="precio-total-carrito" style="color: #0056b3;">$0</span>
        </div>
        <button onclick="enviarPedidoWhatsApp()" style="width: 100%; background: #25d366; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px;">
            Confirmar por WhatsApp
        </button>
    </div>
</div>
    <script src="script.js"></script>

</body>


<div id="resumen-carrito" style="position: fixed; bottom: 20px; right: 20px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 15px rgba(0,0,0,0.2); display: none; z-index: 1000;">
    <h3>Tu Pedido</h3>
    <ul id="lista-carrito"></ul>
    <p><strong>Total: </strong><span id="total-carrito">$0</span></p>
    <button onclick="finalizarPedido()" style="background: #25d366; color: white; border: none; padding: 10px; width: 100%; cursor: pointer;">
        Enviar Pedido por WhatsApp
    </button>
</div>
